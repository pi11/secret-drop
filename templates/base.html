<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}SecretDrop{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Martian+Mono:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f12;
      --surface: #131619;
      --border: #1e2228;
      --accent: #5eb8ff;
      --accent-dim: rgba(94,184,255,0.10);
      --text: #c8d0da;
      --text-muted: #56616e;
      --mono: 'Martian Mono', monospace;
      --danger: #ff6b6b;
    }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      line-height: 1.6;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    .wrap {
      position: relative;
      z-index: 1;
      max-width: 640px;
      margin: 0 auto;
      padding: 3rem 1.5rem;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    header { margin-bottom: 3rem; }

    .logo {
      font-weight: 800;
      font-size: 0.9rem;
      letter-spacing: 0.12em;
      color: var(--accent);
      text-transform: uppercase;
    }

    .logo span { color: var(--text-muted); font-weight: 400; }

    h1 {
      font-weight: 800;
      font-size: clamp(1.6rem, 5vw, 2.4rem);
      line-height: 1.15;
      color: #fff;
      margin-bottom: 0.75rem;
      letter-spacing: -0.02em;
    }

    h1 em {
      font-style: normal;
      color: var(--accent);
    }

    .sub {
      color: var(--text-muted);
      font-size: 0.82rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2rem;
      margin-top: 2rem;
    }

    textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.88rem;
      padding: 0.85rem 1rem;
      resize: vertical;
      min-height: 140px;
      outline: none;
      transition: border-color 0.15s;
    }

    textarea:focus { border-color: var(--accent); }
    textarea::placeholder { color: var(--text-muted); }

    .btn {
      display: inline-block;
      margin-top: 1rem;
      padding: 0.7rem 1.6rem;
      background: var(--accent);
      color: #0d0f12;
      font-family: var(--mono);
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.15s, transform 0.1s;
    }

    .btn:hover { opacity: 0.85; }
    .btn:active { transform: translateY(1px); }

    .link-box {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--bg);
      border: 1px solid var(--accent);
      border-radius: 3px;
      padding: 0.75rem 1rem;
      margin-top: 1.25rem;
    }

    .link-box .link-text {
      flex: 1;
      color: var(--accent);
      font-size: 0.88rem;
      word-break: break-all;
    }

    .copy-btn {
      background: var(--accent-dim);
      border: 1px solid var(--accent);
      color: var(--accent);
      font-family: var(--mono);
      font-size: 0.72rem;
      padding: 0.32rem 0.65rem;
      border-radius: 2px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }

    .copy-btn:hover { background: var(--accent); color: #0d0f12; }

    .secret-text {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 1.25rem;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 0.95rem;
      line-height: 1.7;
      color: #fff;
      margin-top: 1rem;
    }

    .notice {
      display: flex;
      align-items: flex-start;
      gap: 0.6rem;
      padding: 0.8rem 1rem;
      border-radius: 3px;
      font-size: 0.8rem;
      margin-top: 1rem;
      line-height: 1.5;
    }

    .notice.warn {
      background: rgba(255,107,107,0.07);
      border: 1px solid rgba(255,107,107,0.22);
      color: var(--danger);
    }

    .notice.info {
      background: var(--accent-dim);
      border: 1px solid rgba(94,184,255,0.2);
      color: var(--accent);
    }

    .notice .icon { flex-shrink: 0; margin-top: 1px; }

    .error {
      color: var(--danger);
      font-size: 0.8rem;
      margin-top: 0.5rem;
    }

    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 1.5rem;
      color: var(--text-muted);
      font-size: 0.75rem;
      border-top: 1px solid var(--border);
    }

    .label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }

    @media (max-width: 480px) {
      .card { padding: 1.25rem; }
    }
  </style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">Secret<span>Drop</span></div>
  </header>
  {% block content %}{% endblock %}
</div>
<footer>one-time links &mdash; secrets vanish after being read &mdash; 24h max ttl</footer>
</body>
</html>
